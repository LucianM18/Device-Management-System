<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Register</mat-card-title>
      <mat-card-subtitle>Create a new account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" autocomplete="name" />
          <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required.</mat-error>
          <mat-error *ngIf="form.get('name')?.hasError('maxlength')">Name cannot exceed 100 characters.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required.</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Enter a valid email address.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="new-password" />
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required.</mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">Password must be at least 6 characters.</mat-error>
        </mat-form-field>

        <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

        <button mat-flat-button color="primary" type="submit" [disabled]="loading" class="full-width">
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="login-link">Already have an account? <a routerLink="/login">Sign in</a></p>
    </mat-card-actions>
  </mat-card>
</div>
